<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة أسعار TikTok - Simpai Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>إعداد قائمة أسعار TikTok 🎯</h1>

        <div class="store-info">
            <div class="input-group">
                <label>اسم المتجر:</label>
                <input type="text" id="storeName" value="Simpai Store">
            </div>
            <div class="input-group">
                <label>رابط الموقع:</label>
                <input type="text" id="channelLink" value="Simpaistore.com">
            </div>
            <div class="input-group">
                <label>رقم الواتساب:</label>
                <input type="text" id="phoneNum" value="0964241017">
            </div>
        </div>

        <hr>

        <div class="exchange-rate">
            <label for="usdRate">سعر صرف الجنيه (مقابل 1 دولار):</label>
            <input type="number" id="usdRate" value="4140" min="0">
        </div>

        <table id="products">
            <thead>
                <tr>
                    <th>الكمية (🪙)</th>
                    <th>السعر ($)</th>
                    <th>السعر (ج)</th>
                </tr>
            </thead>
            <tbody> 
                <tr class="category" data-name="💰 الأسعار">
                    <td>200🪙</td>
                    <td class="usd-price">2.90</td>
                    <td class="local-price">0</td>
                </tr>
                <tr>
                    <td>350🪙</td>
                    <td class="usd-price">5.07</td>
                    <td class="local-price">0</td>
                </tr>
                <tr>
                    <td>500🪙</td>
                    <td class="usd-price">6.76</td>
                    <td class="local-price">0</td>
                </tr>
                <tr>
                    <td>700🪙</td>
                    <td class="usd-price">9.66</td>
                    <td class="local-price">0</td>
                </tr>
                <tr>
                    <td>1,000🪙</td>
                    <td class="usd-price">12.08</td>
                    <td class="local-price">0</td>
                </tr>
                <tr>
                    <td>1,500🪙</td>
                    <td class="usd-price">18.12</td>
                    <td class="local-price">0</td>
                </tr>
                <tr>
                    <td>3,000🪙</td>
                    <td class="usd-price">36.23</td>
                    <td class="local-price">0</td>
                </tr>
                <tr>
                    <td>5,000🪙</td>
                    <td class="usd-price">60.39</td>
                    <td class="local-price">0</td>
                </tr>
                <tr>
                    <td>6,000🪙</td>
                    <td class="usd-price">72.46</td>
                    <td class="local-price">0</td>
                </tr>
                <tr class="category" data-name="🔥 كميات كبيرة">
                    <td>10,000🪙</td>
                    <td class="usd-price">113.53</td>
                    <td class="local-price">0</td>
                </tr>
                <tr>
                    <td>20,000🪙</td>
                    <td class="usd-price">227.05</td>
                    <td class="local-price">0</td>
                </tr>
                <tr>
                    <td>30,000🪙</td>
                    <td class="usd-price">340.58</td>
                    <td class="local-price">0</td>
                </tr>
            </tbody>
        </table>

        <button id="copyButton" class="copy-button">نسخ اللستة المحدثة ✨</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
